name: Build & publish container

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases / upload assets on tags
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # On a version tag, stamp the tag into the plugin's _meta.lua, then
      # package it so the server image and its matching plugin ship together.
      - name: Package KOReader plugin
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Single source of truth: write the git tag into _meta.lua's version.
          sed -i -E "s/(version = \")[^\"]*(\")/\1${{ github.ref_name }}\2/" \
            plugin/booky.koplugin/_meta.lua
          grep version plugin/booky.koplugin/_meta.lua
          # Zip from inside plugin/ so the archive root is booky.koplugin/ —
          # unzips straight into .adds/koreader/plugins/ with no nested dirs.
          cd plugin && zip -r ../booky.koplugin.zip booky.koplugin

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: booky.koplugin.zip
          generate_release_notes: true
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            **KOReader plugin:** download `booky.koplugin.zip`, unzip into
            `.adds/koreader/plugins/` on the Kobo (the zip already contains the
            `booky.koplugin/` folder), then restart KOReader. Keep the plugin and
            the server image on the same version.
