name: Build & publish container

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases / upload assets on tags
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # On a version tag, package the KOReader plugin and publish a Release so
      # the server image and its matching plugin always ship together.
      - name: Package KOReader plugin
        if: startsWith(github.ref, 'refs/tags/v')
        run: zip -r booky.koplugin.zip plugin/booky.koplugin

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: booky.koplugin.zip
          generate_release_notes: true
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            **KOReader plugin:** download `booky.koplugin.zip` below, unzip into
            `.adds/koreader/plugins/` on the Kobo (so you get
            `.adds/koreader/plugins/booky.koplugin/`), then restart KOReader.
            Keep the plugin and the server image on the same version.
